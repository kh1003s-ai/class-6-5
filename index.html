<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6학년 5반 키우기 (Realtime Cloud)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --main-blue: #4a90e2; --admin-red: #e74c3c; --gold: #f1c40f; --green: #2ecc71; --purple: #9b59b6; --dark: #34495e; --notice-bg: #fff9db; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        .main-wrapper { display: flex; gap: 20px; max-width: 1450px; margin: auto; align-items: flex-start; }
        .content-area { flex: 1; min-width: 0; }
        .ranking-side { width: 260px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 20px; }
        .ranking-section { margin-bottom: 25px; }
        .ranking-title { font-weight: bold; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 10px; text-align: center; }
        .rank-item { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        .rank-num { width: 25px; font-weight: 800; color: #888; }
        .rank-name { flex: 1; font-weight: 600; }
        .rank-score { font-weight: bold; color: var(--purple); }
        .header-stats { background: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .total-donation-box { font-size: 1.4rem; color: var(--green); font-weight: bold; margin-bottom: 15px; }
        .admin-top-group { position: absolute; top: 15px; right: 20px; display: flex; gap: 8px; }
        #mainAdminLoginBtn { background: #eee; color: #888; border: 1px solid #ddd; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 10px; }
        .notice-container { background: var(--notice-bg); border: 2px solid #fab005; border-radius: 12px; padding: 15px; margin: 15px auto; max-width: 800px; }
        .notice-content { font-size: 1.05rem; color: #444; white-space: pre-wrap; min-height: 50px; outline: none; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; }
        .student-card { background: white; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; border: 1px solid #eee; }
        .student-card:hover { border-color: var(--main-blue); transform: translateY(-3px); }
        .teacher-card { border: 3px solid var(--purple) !important; background: #fdfaff !important; }
        .gold-card { border: 3px solid var(--gold) !important; background: #fffdf5 !important; }
        #detailPage, #shopPage { display: none; max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--main-blue); color: white; }
        .item-card { border: 1px solid #eee; padding: 12px; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="main-wrapper">
            <div class="content-area">
                <div class="header-stats">
                    <div class="admin-top-group">
                        <button id="mainAdminLoginBtn" onclick="toggleAdmin()">🔒 관리자 로그인</button>
                    </div>
                    <h1>🏫 6학년 5반 키우기</h1>
                    <div class="total-donation-box">🌟 누적 기부액: <span id="totalDonationDisplay">0</span>원</div>
                    <div id="noticeBox" class="notice-container">
                        <div style="font-weight:bold; color:#f08c00; margin-bottom:8px;">📢 알림장</div>
                        <div id="noticeContent" class="notice-content" oninput="saveNotice()"></div>
                    </div>
                </div>
                <div id="studentGrid" class="grid-container"></div>
            </div>
            <div class="ranking-side">
                <div class="ranking-section">
                    <div class="ranking-title">🏆 능력치 TOP 10</div>
                    <div id="statRankList"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="detailPage">
        <button class="btn" onclick="showMain()">← 전체 명단</button>
        <h2 id="viewName">이름</h2>
        <div style="display: flex; gap: 40px;">
            <div style="width: 250px;">
                <h4>💰 잔액: <span id="viewMoney">0</span>원</h4>
                <button class="btn btn-blue" style="width:100%" onclick="showShop()">🛒 상점 방문</button>
                <button class="btn" style="width:100%; margin-top:10px; background:var(--green); color:white;" onclick="donateMoney()">❤️ 기부하기</button>
            </div>
            <div style="flex: 1;">
                <h3>📊 능력치</h3>
                <div id="statList"></div>
                <div id="adminPanel" style="display:none; background:#fff5f5; padding:15px; border-radius:10px; margin-top:15px;">
                    <strong style="color:var(--admin-red)">🛠 관리자 도구</strong><br>
                    <input type="number" id="moneyInput" placeholder="금액" style="width:80px;">
                    <button onclick="updateMoney(1)">지급</button>
                    <button onclick="updateMoney(-1)">차감</button>
                </div>
            </div>
        </div>
    </div>

    <div id="shopPage">
        <button class="btn" onclick="closeShop()">← 뒤로가기</button>
        <h3>🛒 상점</h3>
        <div id="shopGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;"></div>
    </div>

    <script>
        // 1. Firebase 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyCqE1dKLYBjVnJFtnet7I4NKyKUAma3dgY",
            authDomain: "class6-5-5faf8.firebaseapp.com",
            databaseURL: "https://class6-5-5faf8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "class6-5-5faf8",
            storageBucket: "class6-5-5faf8.firebasestorage.app",
            messagingSenderId: "178537841758",
            appId: "1:178537841758:web:e4cd2fb886d1685900e0cf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdmin = false;
        let currentIdx = null;
        let students = [];

        // 2. 실시간 데이터 불러오기
        function initSync() {
            db.ref('classData').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    students = data.students || [];
                    if (!isAdmin) document.getElementById('noticeContent').innerText = data.notice || "";
                    renderGrid();
                    if (currentIdx !== null) updateUI();
                } else {
                    resetData();
                }
            });
        }

        // 초기 데이터 생성
        function resetData() {
            const initialStudents = Array.from({length: 25}, (_, i) => ({
                num: i + 1,
                name: (i === 24) ? "선생님" : `${i+1}번 학생`,
                money: 1000,
                donation: 0,
                stats: { "체력": 10, "지력": 10, "인성": 10 },
                pw: "1234"
            }));
            db.ref('classData').set({ students: initialStudents, notice: "환영합니다!" });
        }

        function renderGrid() {
            const grid = document.getElementById('studentGrid');
            grid.innerHTML = '';
            let totalD = 0;

            students.forEach((s, idx) => {
                totalD += s.donation;
                const card = document.createElement('div');
                card.className = `student-card ${idx === 24 ? 'teacher-card' : ''}`;
                card.innerHTML = `<div>${s.num}번</div><strong>${s.name}</strong><div>💰 ${s.money.toLocaleString()}</div>`;
                card.onclick = () => showDetail(idx);
                grid.appendChild(card);
            });
            document.getElementById('totalDonationDisplay').innerText = totalD.toLocaleString();
            updateRanking();
        }

        function updateRanking() {
            const sorted = [...students].sort((a, b) => {
                const sumA = Object.values(a.stats).reduce((p,c)=>p+c, 0);
                const sumB = Object.values(b.stats).reduce((p,c)=>p+c, 0);
                return sumB - sumA;
            }).slice(0, 10);

            let html = '';
            sorted.forEach((s, i) => {
                const sum = Object.values(s.stats).reduce((p,c)=>p+c, 0);
                html += `<div class="rank-item"><span class="rank-num">${i+1}</span><span>${s.name}</span><span class="rank-score">${sum}</span></div>`;
            });
            document.getElementById('statRankList').innerHTML = html;
        }

        function showDetail(idx) {
            const s = students[idx];
            const pass = prompt("비밀번호를 입력하세요");
            if (pass !== s.pw) return alert("틀렸습니다.");
            
            currentIdx = idx;
            document.getElementById('mainPage').style.display='none';
            document.getElementById('detailPage').style.display='block';
            updateUI();
        }

        function updateUI() {
            const s = students[currentIdx];
            document.getElementById('viewName').innerText = s.name;
            document.getElementById('viewMoney').innerText = s.money.toLocaleString();
            
            let h = '';
            for(let [k, v] of Object.entries(s.stats)) {
                h += `<div>${k}: ${v} <button onclick="levelUp('${k}')">강화(100원)</button></div>`;
            }
            document.getElementById('statList').innerHTML = h;
            document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
        }

        function levelUp(key) {
            const s = students[currentIdx];
            if (s.money >= 100) {
                s.money -= 100;
                s.stats[key] += 1;
                saveToFirebase();
            } else { alert("돈이 부족합니다."); }
        }

        function saveToFirebase() {
            db.ref('classData/students').set(students);
        }

        function saveNotice() {
            if (isAdmin) {
                const txt = document.getElementById('noticeContent').innerText;
                db.ref('classData/notice').set(txt);
            }
        }

        function toggleAdmin() {
            const pw = prompt("관리자 비번");
            if (pw === "0605") {
                isAdmin = !isAdmin;
                alert(isAdmin ? "관리자 모드 활성" : "관리자 모드 해제");
                document.getElementById('noticeContent').contentEditable = isAdmin;
                updateUI();
            }
        }

        function showMain() {
            currentIdx = null;
            document.getElementById('mainPage').style.display='block';
            document.getElementById('detailPage').style.display='none';
        }

        // 초기 실행
        initSync();
    </script>
</body>
</html>
