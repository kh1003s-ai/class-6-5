<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6학년 5반 키우기</title>
    <style>
        :root { --main-blue: #4a90e2; --admin-red: #e74c3c; --gold: #f1c40f; --green: #2ecc71; --purple: #9b59b6; --dark: #34495e; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        
        /* 헤더 */
        .header-stats { background: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .total-donation-box { font-size: 1.4rem; color: var(--green); font-weight: bold; }
        
        /* 관리자 전용 리셋 버튼 스타일 */
        #adminResetBtn { display: none; position: absolute; top: 10px; right: 20px; background: #eee; color: #999; font-size: 10px; border: 1px solid #ddd; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        #adminResetBtn:hover { background: var(--admin-red); color: white; border-color: var(--admin-red); }

        /* 메인 그리드 */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1100px; margin: auto; }
        .student-card { background: white; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; border: 1px solid #eee; position: relative; }
        .student-card:hover { transform: translateY(-5px); border-color: var(--main-blue); }
        
        .card-money { margin-top: 5px; font-size: 0.95rem; color: #d35400; font-weight: bold; }
        .personal-stat-sum { margin-top: 5px; font-size: 0.8rem; color: #555; background: #eef5ff; padding: 3px 8px; border-radius: 20px; display: inline-block; font-weight: 600; }

        .edit-area { margin-top: 10px; display: flex; justify-content: center; gap: 8px; opacity: 0; transition: 0.3s; }
        .student-card:hover .edit-area { opacity: 1; }
        .edit-btn { font-size: 10px; color: #999; text-decoration: underline; cursor: pointer; }

        /* 상세 & 상점 페이지 */
        #detailPage, #shopPage { display: none; max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .medal-shelf { display: flex; flex-wrap: wrap; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 15px; border: 2px inset #eee; min-height: 50px; margin-bottom: 20px; }
        
        .shop-section-title { border-left: 5px solid var(--main-blue); padding-left: 10px; margin: 30px 0 15px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 15px; }
        .item-card { border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; background: #fff; transition: 0.2s; }
        .sold-out { background: #f8f9fa; color: #adb5bd; opacity: 0.7; }
        
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--main-blue); color: white; }
        .admin-edit-box { display: none; background: #fff5f5; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #ffcdd2; font-size: 12px; text-align: left; }
        .toggle-btn { font-size: 10px; padding: 2px 5px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; }
        .on { background: var(--green); color: white; border: none; }
        .off { background: var(--admin-red); color: white; border: none; }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="header-stats">
            <button id="adminResetBtn" onclick="resetAllData()">⚠️ 전체 데이터 초기화</button>
            <h1>🏫 6학년 5반 키우기</h1>
            <div class="total-donation-box">🌟 우리 반 누적 기부액: <span id="totalDonationDisplay">0</span>원</div>
            <div style="margin-top:10px;">
                <small style="color:#aaa;">각 학생 카드를 클릭하여 개인 페이지로 이동하세요.</small>
            </div>
        </div>
        <div id="studentGrid" class="grid-container"></div>
    </div>

    <div id="detailPage">
        <button class="btn" onclick="showMain()">← 전체 명단</button>
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0;">
            <h2 id="viewName">학생 이름</h2>
            <button id="adminLoginBtn" class="btn" style="background:#ddd" onclick="toggleAdmin()">🔒 관리자 로그인</button>
        </div>
        
        <div style="display: flex; gap: 30px;">
            <div style="width: 250px;">
                <h4>🏆 획득한 칭호</h4>
                <div class="medal-shelf" id="myMedals"></div>
                <button class="btn btn-blue" style="width:100%" onclick="showShop()">🛒 상점 방문</button>
                <button class="btn" style="width:100%; margin-top:10px; background:var(--green); color:white;" onclick="donateMoney()">❤️ 기부하기</button>
            </div>
            <div style="flex: 1;">
                <h3 style="margin:0">💰 잔액: <span id="viewMoney">0</span>원</h3>
                <h4 style="margin:5px 0; color:var(--green)">🕊️ 나의 기부: <span id="viewMyDonation">0</span>원</h4>
                <hr>
                <h3 id="personalStatSumDisplay">📊 능력치 (합계: 0/500)</h3>
                <div id="statList"></div>
                <div class="admin-box admin-edit-box" id="adminPanel">
                    <strong>🛠 선생님 도구</strong><br>
                    금액 조절: <input type="number" id="moneyInput" style="width:60px">
                    <button class="btn btn-blue" style="padding:2px 8px" onclick="updateMoney(1)">+</button>
                    <button class="btn" style="background:var(--admin-red); color:white; padding:2px 8px" onclick="updateMoney(-1)">-</button>
                </div>
            </div>
        </div>
    </div>

    <div id="shopPage">
        <button class="btn" onclick="closeShop()">← 뒤로가기</button>
        <h3 class="shop-section-title">🎖️ 칭호 상점</h3>
        <div id="titleShopGrid" class="shop-grid"></div>
        <h3 class="shop-section-title">🧪 포션 상점</h3>
        <div id="potionShopGrid" class="shop-grid"></div>
    </div>

    <script>
        let isAdmin = false;
        const ADMIN_PW = "9912";
        let currentIdx = null;
        const SINGLE_STAT_MAX = 100;

        let titleData = [
            { id: 't1', name: '6학년을 시작하는 자', icon: '🌱', price: 1000, isForSale: true, effect: '모든능력치+1' },
            { id: 't2', name: '6학년을 조금 아는 자', icon: '🌿', price: 5000, isForSale: true, effect: '모든능력치+5' },
            { id: 't3', name: '6학년을 지배하는 자', icon: '🌳', price: 20000, isForSale: true, effect: '모든능력치+10' },
            { id: 't10', name: '재력과시', icon: '💎', price: 50000, isForSale: true, effect: '모든능력치+20' },
            { id: 't4', name: '6학년 5반의 군주', icon: '👑', price: 100000, isForSale: true, effect: '모든능력치 100(고정)' },
            { id: 't5', name: '공부왕', icon: '📖', price: 3000, isForSale: true, effect: '지력+10' },
            { id: 't6', name: '운동왕', icon: '⚽', price: 3000, isForSale: true, effect: '체력+10' },
            { id: 't7', name: '기부왕', icon: '👼', price: 3000, isForSale: true, effect: '인성+10' },
            { id: 't8', name: '복습왕', icon: '📝', price: 3000, isForSale: true, effect: '정신력+10' },
            { id: 't9', name: '도움왕', icon: '🤝', price: 3000, isForSale: true, effect: '인성+10' }
        ];

        let potionData = [
            { id: 'p1', name: '체력 포션', icon: '❤️', stat: '체력', price: 500, isForSale: true },
            { id: 'p2', name: '지력 포션', icon: '💎', stat: '지력', price: 500, isForSale: true },
            { id: 'p3', name: '창의력 포션', icon: '💡', stat: '창의성', price: 500, isForSale: true },
            { id: 'p4', name: '정신력 포션', icon: '🌀', stat: '정신력', price: 500, isForSale: true },
            { id: 'p5', name: '인성 포션', icon: '🍀', stat: '인성', price: 500, isForSale: true }
        ];

        let students = [];

        function saveData() {
            localStorage.setItem('class65_students_v15', JSON.stringify(students));
            localStorage.setItem('class65_titles_v15', JSON.stringify(titleData));
            localStorage.setItem('class65_potions_v15', JSON.stringify(potionData));
        }

        function loadData() {
            const savedStudents = localStorage.getItem('class65_students_v15');
            const savedTitles = localStorage.getItem('class65_titles_v15');
            const savedPotions = localStorage.getItem('class65_potions_v15');
            if (savedStudents) { students = JSON.parse(savedStudents); } 
            else {
                students = Array.from({length: 25}, (_, i) => ({
                    num: i + 1, name: `${i+1}번 학생`, money: 10000, donation: 0,
                    stats: { "체력": 5, "지력": 5, "창의성": 5, "정신력": 5, "인성": 5 },
                    myTitles: []
                }));
            }
            if (savedTitles) titleData = JSON.parse(savedTitles);
            if (savedPotions) potionData = JSON.parse(savedPotions);
        }

        // (수정) 전체 초기화 로직: isAdmin 상태가 true일 때만 실제 작동하도록 더블 체크
        function resetAllData() { 
            if(!isAdmin) { alert("선생님 로그인이 필요합니다."); return; }
            if(confirm("❗ 주의: 모든 데이터가 삭제됩니다. 계속하시겠습니까?")) {
                const check = prompt("삭제를 위해 '삭제승인'이라고 입력하세요.");
                if(check === "삭제승인") {
                    localStorage.clear(); 
                    location.reload(); 
                } else {
                    alert("문구가 일치하지 않아 취소되었습니다.");
                }
            } 
        }

        function renderGrid() {
            const grid = document.getElementById('studentGrid');
            grid.innerHTML = '';
            let totalDonationSum = 0;
            students.forEach((s, idx) => {
                totalDonationSum += s.donation;
                const personalStatSum = Object.values(s.stats).reduce((a, b) => a + b, 0);
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div style="font-size:0.8rem; color:#888;">${s.num}번</div>
                    <div style="font-size:1.1rem; font-weight:bold;">${s.name}</div>
                    <div class="card-money">💰 ${s.money.toLocaleString()}원</div>
                    <div class="personal-stat-sum">⚡ 능력합: ${personalStatSum}</div>
                    <div class="edit-area">
                        <span class="edit-btn" onclick="editNum(event, ${idx})">번호수정</span>
                        <span class="edit-btn" onclick="editName(event, ${idx})">이름수정</span>
                    </div>`;
                card.onclick = () => showDetail(idx);
                grid.appendChild(card);
            });
            document.getElementById('totalDonationDisplay').innerText = totalDonationSum.toLocaleString();
            
            // 관리자 로그인 상태라면 메인에서도 리셋 버튼 노출
            document.getElementById('adminResetBtn').style.display = isAdmin ? 'block' : 'none';
        }

        function toggleAdmin() { 
            const pw = prompt("관리자 암호를 입력하세요.");
            if(pw === ADMIN_PW) { 
                isAdmin = true; 
                alert("관리자 모드 활성화!");
                updateUI(); 
                renderGrid(); // 메인 화면 버튼 상태 업데이트를 위해 호출
            } else {
                alert("암호가 틀렸습니다.");
            }
        }

        // --- 이하 로직 v14와 동일 ---
        function editNum(e, idx) { e.stopPropagation(); const n = prompt("새 번호", students[idx].num); if(n) { students[idx].num = parseInt(n); saveData(); renderGrid(); } }
        function editName(e, idx) { e.stopPropagation(); const n = prompt("새 이름", students[idx].name); if(n) { students[idx].name = n; saveData(); renderGrid(); } }
        function showDetail(idx) { currentIdx = idx; document.getElementById('mainPage').style.display = 'none'; document.getElementById('detailPage').style.display = 'block'; updateUI(); }
        
        function updateUI() {
            const s = students[currentIdx];
            const sum = Object.values(s.stats).reduce((a, b) => a + b, 0);
            document.getElementById('viewName').innerText = `${s.num}번 ${s.name}`;
            document.getElementById('viewMoney').innerText = s.money.toLocaleString();
            document.getElementById('viewMyDonation').innerText = s.donation.toLocaleString();
            document.getElementById('myMedals').innerHTML = s.myTitles.map(t => `<span style="font-size:25px" title="${t.name}">${t.icon}</span>`).join(' ');
            document.getElementById('personalStatSumDisplay').innerText = `📊 능력치 (합계: ${sum}/500)`;
            let statHtml = '';
            for (let [name, value] of Object.entries(s.stats)) {
                statHtml += `<div style="margin-bottom:8px; display:flex; align-items:center; gap:10px; font-size:14px;">
                    <span style="width:60px">${name}</span>
                    <div style="flex-grow:1; height:8px; background:#eee; border-radius:5px; overflow:hidden;">
                        <div style="height:100%; background:${value >= 100 ? 'var(--gold)' : 'var(--main-blue)'}; width:${value}%"></div>
                    </div>
                    <span style="${value >= 100 ? 'font-weight:bold; color:var(--gold)' : ''}">${value}</span>
                </div>`;
            }
            document.getElementById('statList').innerHTML = statHtml;
            document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('adminLoginBtn').style.display = isAdmin ? 'none' : 'block';
        }

        function renderShopItems() {
            const s = students[currentIdx];
            let tHtml = '';
            titleData.forEach(t => {
                const isOwned = s.myTitles.some(owned => owned.id === t.id);
                tHtml += `<div class="item-card ${(!t.isForSale || isOwned) ? 'sold-out' : ''}">
                    <div style="font-size:30px">${t.icon}</div>
                    <strong>${t.name}</strong><br><small>${t.effect}</small><br>
                    <span style="color:var(--gold); font-weight:bold;">${t.price.toLocaleString()}원</span><br>
                    ${isOwned ? '<b>[보유 중]</b>' : `<button class="btn btn-blue" onclick="buyTitle('${t.id}')">구매</button>`}
                    <div class="admin-edit-box" style="display:${isAdmin?'block':'none'}">
                        가격: <input type="number" value="${t.price}" style="width:60px" onchange="updateItemPrice('title', '${t.id}', this.value)"><br>
                        판매: <button class="toggle-btn ${t.isForSale?'on':'off'}" onclick="toggleSale('title', '${t.id}')">${t.isForSale?'ON':'OFF'}</button>
                    </div>
                </div>`;
            });
            document.getElementById('titleShopGrid').innerHTML = tHtml;
            let pHtml = '';
            potionData.forEach(p => {
                pHtml += `<div class="item-card ${!p.isForSale ? 'sold-out' : ''}">
                    <div style="font-size:30px">${p.icon}</div>
                    <strong>${p.name}</strong><br><small>${p.stat}+1</small><br>
                    <span style="color:var(--purple); font-weight:bold;">${p.price.toLocaleString()}원</span><br>
                    <button class="btn" style="background:var(--purple); color:white" onclick="buyPotion('${p.id}')">구매</button>
                    <div class="admin-edit-box" style="display:${isAdmin?'block':'none'}">
                        가격: <input type="number" value="${p.price}" style="width:60px" onchange="updateItemPrice('potion', '${p.id}', this.value)"><br>
                        판매: <button class="toggle-btn ${p.isForSale?'on':'off'}" onclick="toggleSale('potion', '${p.id}')">${p.isForSale?'ON':'OFF'}</button>
                    </div>
                </div>`;
            });
            document.getElementById('potionShopGrid').innerHTML = pHtml;
        }

        function buyTitle(id) {
            const t = titleData.find(item => item.id === id);
            const s = students[currentIdx];
            if(s.money >= t.price) {
                s.money -= t.price; s.myTitles.push(t); 
                const safeAdd = (key, val) => s.stats[key] = Math.min(s.stats[key] + val, SINGLE_STAT_MAX);
                if(t.id === 't4') Object.keys(s.stats).forEach(k => s.stats[k] = SINGLE_STAT_MAX);
                else if(t.id === 't1') Object.keys(s.stats).forEach(k => safeAdd(k, 1));
                else if(t.id === 't2') Object.keys(s.stats).forEach(k => safeAdd(k, 5));
                else if(t.id === 't3') Object.keys(s.stats).forEach(k => safeAdd(k, 10));
                else if(t.id === 't10') Object.keys(s.stats).forEach(k => safeAdd(k, 20));
                else if(t.id === 't5') safeAdd('지력', 10);
                else if(t.id === 't6') safeAdd('체력', 10);
                else if(t.id === 't7' || t.id === 't9') safeAdd('인성', 10);
                else if(t.id === 't8') safeAdd('정신력', 10);
                saveData(); updateUI(); renderShopItems(); alert(`칭호 획득!`);
            } else alert("잔액 부족");
        }

        function buyPotion(id) {
            const p = potionData.find(item => item.id === id);
            const s = students[currentIdx];
            if(s.stats[p.stat] >= SINGLE_STAT_MAX) { alert(`최대치입니다!`); return; }
            if(s.money >= p.price) {
                s.money -= p.price; s.stats[p.stat] += 1;
                saveData(); updateUI(); alert(`구매 성공!`);
            } else alert("잔액 부족");
        }

        function updateItemPrice(type, id, newPrice) { const list = (type === 'title') ? titleData : potionData; list.find(i => i.id === id).price = parseInt(newPrice); saveData(); }
        function toggleSale(type, id) { const list = (type === 'title') ? titleData : potionData; const item = list.find(i => i.id === id); item.isForSale = !item.isForSale; saveData(); renderShopItems(); }
        function donateMoney() { const a = parseInt(prompt("기부액")); if(a > 0 && students[currentIdx].money >= a) { students[currentIdx].money -= a; students[currentIdx].donation += a; saveData(); updateUI(); alert("감사합니다!"); } }
        function updateMoney(d) { const v = parseInt(document.getElementById('moneyInput').value); if(v) { students[currentIdx].money += (v * d); saveData(); updateUI(); } }
        function showMain() { document.getElementById('mainPage').style.display='block'; document.getElementById('detailPage').style.display='none'; renderGrid(); }
        function showShop() { document.getElementById('detailPage').style.display='none'; document.getElementById('shopPage').style.display='block'; renderShopItems(); }
        function closeShop() { document.getElementById('shopPage').style.display='none'; document.getElementById('detailPage').style.display='block'; updateUI(); }

        loadData(); renderGrid();
    </script>
</body>
</html>
